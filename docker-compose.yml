services:
  web:
    image: node:22-alpine
    container_name: ai_document_web
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

  backend:
    build: .
    container_name: ai_document_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
      - qdrant
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: ai_document_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_document_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_document_redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: ai_document_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant
    container_name: ai_document_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  worker:
    build: .
    container_name: ai_document_worker
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - minio
      - qdrant
    command: rq worker ${RQ_QUEUE_NAME} --url redis://redis:${REDIS_PORT}/${REDIS_DB}

volumes:
  postgres_data:
  minio_data:
  qdrant_data: